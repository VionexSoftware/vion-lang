name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  # ── Build & test on every push ──────────────────────────────────────────────
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: |
          cd build
          ctest -C Release --output-on-failure

      # Upload binary as artifact on every build
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: vion-windows-${{ github.sha }}
          path: build/Release/vion.exe
          retention-days: 7

  # ── Create GitHub Release when a vX.Y.Z tag is pushed ───────────────────────
  release:
    name: Release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package (CPack ZIP)
        run: |
          cd build
          cpack -C Release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Vion ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            build/vion-*.zip
          body: |
            ## Vion ${{ github.ref_name }}

            ### Installation (Windows)
            ```powershell
            irm https://raw.githubusercontent.com/AlexanderPhan04/vion-lang/main/scripts/install-online-windows.ps1 | iex
            ```

            Or download the ZIP below and run `install-windows.ps1` manually.
